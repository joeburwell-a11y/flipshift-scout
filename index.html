};

// LocalStorage persistence (works offline, no external storage needed)
const store = {
  get: (key) => { try { const v=localStorage.getItem(key); return v?JSON.parse(v):null; } catch{return null;} },
  set: (key,val) => { try { localStorage.setItem(key,JSON.stringify(val)); } catch{} },
  keys: (prefix) => {
    try {
      const out=[];
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k&&k.startsWith(prefix)) out.push(k);
      }
      return out;
    } catch { return []; }
  },
};

// ── Gmail compose link builder ────────────────────────────────────────────────
function buildGmailLink(items, summary) {
  const dateStr = new Date().toLocaleDateString("en-US",{
    weekday:"long",year:"numeric",month:"long",day:"numeric"
  });
  const lines = items.slice(0,12).map((it,i)=>{
    const sold   = it.avgSoldPrice   ? "$"+it.avgSoldPrice.toFixed(2) : "--";
    const buy    = it.thriftCost     ? "$"+it.thriftCost              : "--";
    const str    = it.sellThroughRate!=null ? it.sellThroughRate+"%" : "--";
    const sizes  = (it.sizes||[]).join(", ")||"--";
    const colors = (it.colors||[]).slice(0,3).join(", ")||"--";
    const days   = it.avgDaysToSell  ? " | "+it.avgDaysToSell+"d avg" : "";
    const tip    = it.insight        ? "\n  Tip: "+it.insight         : "";
    return "#"+(i+1)+" "+it.brand+" -- "+(it.category||"Clothing")+"\n"
         + "  Sizes: "+sizes+" | Colors: "+colors+"\n"
         + "  Avg Sold: "+sold+" | Buy up to: "+buy+" | STR: "+str+days+tip;
  }).join("\n\n");

  const body = [
    "FLIPSHIFT SCOUT -- DAILY BUY REPORT",dateStr,
    "----------------------------------------","",
    "MARKET SNAPSHOT",
    "Avg Sell-Through: "+(summary?.avgSTR||"--")+"%",
    "Market: "+(summary?.hotMarket||"--"),
    "Best Time to List: "+(summary?.bestTimeToSell||"--"),
    "Tip: "+(summary?.tip||"--"),"",
    "========================================",
    "TOP SELLERS -- BUY THESE TODAY",
    "========================================","",lines,"",
    "----------------------------------------",
    "Happy flipping, Joe!","-- FlipShift Scout",
  ].join("\n");

  return "https://mail.google.com/mail/?view=cm"
       + "&to="  +encodeURIComponent(EMAIL_TO)
       + "&su="  +encodeURIComponent("FlipShift Scout -- Daily Buy Report ("+dateStr+")")
       + "&body="+encodeURIComponent(body);
}

// ── Fetch market data ─────────────────────────────────────────────────────────
async function fetchMarketData(catLabels, customQ, apiKey) {
  const query = customQ || catLabels.join(", ") || "used clothing eBay";
  const resp = await fetch(API_URL, {
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body: JSON.stringify({
      model:"claude-sonnet-4-20250514", max_tokens:2000,
      tools:[{type:"web_search_20250305",name:"web_search"}],
      messages:[{role:"user",content:
        "You are an eBay reseller analyst for used clothing.\n\n"
        +"Analyze eBay SOLD listings for best-performing used clothing in: "+query+".\n\n"
        +"RULES: Output ONLY a raw JSON object. No markdown, no code fences, no preamble.\n"
        +"Use ONLY plain ASCII in all strings. No smart quotes, em dashes, or special characters.\n"
        +"Use plain hyphens not dashes. Keep all insight text simple plain English.\n\n"
        +'Follow this exact JSON structure: {"summary":{"totalAnalyzed":200,"avgSTR":74,'
        +'"hotMarket":"brief description","bestTimeToSell":"Thursday evenings",'
        +'"tip":"one actionable tip"},"items":[{"brand":"Brand","category":"subcategory",'
        +'"sizes":["S","M","L"],"colors":["Black","Navy"],"avgSoldPrice":28.00,'
        +'"priceRange":"$18-$45","thriftCost":8,"sellThroughRate":78,"avgDaysToSell":6,'
        +'"salesCount":47,"competition":"Low","insight":"plain text insight here"}]}\n\n'
        +"Include 10 items. Realistic eBay sold prices. thriftCost = max buy for 40% margin after 13% fees."
      }],
    }),
  });
  if (!resp.ok) throw new Error("API "+resp.status);
  const data = await resp.json();
  const text = (data.content||[]).find(b=>b.type==="text")?.text||"";
  const m = text.match(/\{[\s\S]*\}/);
  if (!m) throw new Error("No JSON in response");
  const clean = m[0]
    .replace(/[\u2018\u2019]/g,"'").replace(/[\u201C\u201D]/g,'"')
    .replace(/\u2013|\u2014/g,"-").replace(/\u2026/g,"...")
    .replace(/[\u0000-\u0008\u000B\u000C\u000E-\u001F]/g," ")
    .replace(/,(\s*[}\]])/g,"$1");
  try { return JSON.parse(clean); }
  catch(e) {
    const sm=clean.match(/"summary"\s*:\s*\{[^}]*\}/);
    const im=clean.match(/"items"\s*:\s*\[[\s\S]*\]/);
    if(im) return JSON.parse("{"+(sm?sm[0]+",":"")+im[0]+"}");
    throw new Error("Parse failed: "+e.message.slice(0,60));
  }
}

  return (
    <div ref={ref} style={{background:"#080b10",border:"1px solid "+C.border,borderRadius:12,

    const keys=store.keys(LOG_PREFIX);
    const entries=keys.map(k=>store.get(k)).filter(Boolean);
    entries.sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp));
    setHistory(entries);
  },[]);

  const runScout = useCallback(async(isAuto=false)=>{
    if(loading||!apiKey) return;
    setLoading(true); setResults([]); setSummary(null); setGmailLink(null); setLogs([]);
    const catLabels=selectedCats.map(id=>CATEGORIES.find(c=>c.id===id)?.label).filter(Boolean);
    addLog((isAuto?"⏰ Auto-scan":"▶ Manual scan")+" started","hi");
    addLog("Scanning: "+(catLabels.join(", ")||"All categories"),"info");

    let items=[], sum=null;
    try {
      addLog("Fetching live eBay sold listing data...","info");
      const data=await fetchMarketData(catLabels,customQ,apiKey);
      items=data.items||[]; sum=data.summary||null;
      addLog("Found "+items.length+" top performers","ok");
      if(sum?.tip) addLog("Tip: "+sum.tip,"hi");
    } catch(err) {
      addLog("API error: "+err.message+" -- using cached data","err");
      items=FALLBACK.items; sum=FALLBACK.summary;
      addLog("Loaded "+items.length+" cached items","ok");
    }

    setResults(items); setSummary(sum);
    const link=buildGmailLink(items,sum);
    setGmailLink(link);
    addLog("Gmail draft ready","ok");

    const now=new Date();
    const entry={date:todayKey(),timestamp:now.toISOString(),
      items,summary:sum,categories:catLabels,gmailLink:link};
    store.set(LOG_PREFIX+entry.date,entry);
    setHistory(prev=>[entry,...prev.filter(e=>e.date!==entry.date)]
      .sort((a,b)=>new Date(b.timestamp)-new Date(a.timestamp)));
    setLastRun(now.toLocaleString());
    addLog("Saved to daily log","ok");
    setLoading(false);
  },[loading,apiKey,selectedCats,customQ,addLog]);

  // Scheduler
  useEffect(()=>{
    clearTimeout(timerRef.current);
    if(!autoEnabled){setNextRun(null);return;}
    const [h,m]=scheduleTime.split(":").map(Number);
    const next=new Date(); next.setHours(h,m,0,0);
    if(next<=new Date()) next.setDate(next.getDate()+1);
    setNextRun(next);
    timerRef.current=setTimeout(()=>runScout(true),next-new Date());
    return()=>clearTimeout(timerRef.current);
  },[autoEnabled,scheduleTime]); // eslint-disable-line

  // Init
  useEffect(()=>{
    loadHistory();
    const todayEntry=store.get(LOG_PREFIX+todayKey());
    if(todayEntry){
      setResults(todayEntry.items||[]); setSummary(todayEntry.summary||null);
      setGmailLink(todayEntry.gmailLink||null);
      setLastRun(fmtDate(todayEntry.timestamp));
      setLogs([{msg:"Today's scan loaded from log ("+fmtDate(todayEntry.timestamp)+")",t:"ok",
        ts:new Date().toLocaleTimeString("en-US",{hour:"2-digit",minute:"2-digit",second:"2-digit"})}]);
    } else if(apiKey) {
      setTimeout(()=>runScout(true),600);
    }
  },[]); // eslint-disable-line

  if(!apiKey) return <SetupScreen onSave={saveApiKey}/>;

  const toggleCat=(id)=>setSelectedCats(p=>p.includes(id)?p.filter(c=>c!==id):[...p,id]);

  // Style helpers
  const tabBtn=(active)=>({padding:"7px 18px",borderRadius:8,fontSize:13,fontWeight:500,
    cursor:"pointer",border:"none",background:active?C.accent:"transparent",
    color:active?"#000":C.textDim,transition:"all .15s",fontFamily:"inherit"});
  const primaryBtn=(disabled)=>({padding:"11px 22px",borderRadius:10,
    background:disabled?C.muted:C.accent,color:disabled?C.textDim:"#000",
    fontWeight:700,fontSize:13,border:"none",cursor:disabled?"not-allowed":"pointer",
    display:"flex",alignItems:"center",gap:8,fontFamily:"inherit",
    transition:"all .15s",whiteSpace:"nowrap"});
  const emailBtnStyle={padding:"11px 20px",borderRadius:10,background:C.greenLo,color:C.green,
    fontWeight:700,fontSize:13,border:"1px solid "+C.green+"55",
    cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8,
    fontFamily:"inherit",whiteSpace:"nowrap"};
  const cardStyle={background:C.card,border:"1px solid "+C.border,borderRadius:14,padding:"20px 22px",marginBottom:16};
  const lbl={fontSize:10,fontFamily:C.mono,color:C.muted,letterSpacing:".1em",textTransform:"uppercase",marginBottom:6};
  const inp={background:C.surface,border:"1px solid "+C.border,borderRadius:8,
    padding:"10px 14px",color:C.text,fontSize:14,fontFamily:C.mono,
    outline:"none",width:"100%",boxSizing:"border-box"};

  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"'Segoe UI',sans-serif"}}>

      {/* Header */}
      <div style={{background:"linear-gradient(180deg,#0a0d14,#070910)",
        borderBottom:"1px solid "+C.border,padding:"14px 24px",
        display:"flex",alignItems:"center",justifyContent:"space-between",
        position:"sticky",top:0,zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
          <div style={{width:32,height:32,background:C.accent,borderRadius:8,
            display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>🔍</div>
          <span style={{fontSize:17,fontWeight:700,letterSpacing:"-.5px"}}>FlipShift Scout</span>
          <span style={{fontSize:10,fontFamily:C.mono,color:C.accent,background:C.accentLo,
            border:"1px solid "+C.accentBrd,borderRadius:4,padding:"2px 6px"}}>DESKTOP</span>
          {autoEnabled&&<span style={{fontSize:10,fontFamily:C.mono,color:C.green,
            background:C.greenLo,border:"1px solid "+C.green+"40",borderRadius:4,padding:"2px 6px"}}>⏰ AUTO</span>}
        </div>
        <div style={{display:"flex",gap:4,alignItems:"center"}}>
          {[["scout","📡 Scout"],["scheduler","⏰ Scheduler"],["history","📋 Log"],["settings","⚙️"]].map(([id,lbl2])=>(
            <button key={id} style={tabBtn(tab===id)} onClick={()=>setTab(id)}>{lbl2}</button>))}
        </div>
      </div>

      <div style={{maxWidth:1100,margin:"0 auto",padding:"22px 20px"}}>

        {/* ── SCOUT ── */}
        {tab==="scout"&&(<>
          <div style={{marginBottom:18}}>
            <div style={lbl}>Categories</div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(116px,1fr))",gap:7,marginBottom:14}}>
              {CATEGORIES.map(c=>(
                <button key={c.id} onClick={()=>toggleCat(c.id)} style={{
                  padding:"9px 10px",borderRadius:10,
                  border:"1px solid "+(selectedCats.includes(c.id)?C.accent:C.border),
                  background:selectedCats.includes(c.id)?C.accentLo:C.card,
                  color:selectedCats.includes(c.id)?C.accent:C.textDim,
                  fontSize:12,fontWeight:500,cursor:"pointer",
                  display:"flex",flexDirection:"column",alignItems:"flex-start",gap:4,
                  transition:"all .15s",fontFamily:"inherit"}}>
                  <span style={{fontSize:17}}>{c.emoji}</span>
                  <span>{c.label}</span>
                </button>))}
            </div>
          </div>

          <div style={{marginBottom:14}}>
            <div style={lbl}>Refine search (optional)</div>
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <input style={{...inp,flex:1,minWidth:220}} value={customQ}
                placeholder="e.g. vintage band tees, Carhartt jackets, Y2K denim..."
                onChange={e=>setCustomQ(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&runScout(false)}/>
              <button style={primaryBtn(loading)} onClick={()=>runScout(false)} disabled={loading}>
                {loading?<Spin/>:"⚡"}{loading?"Scanning...":"Run Scout"}
              </button>
              {gmailLink&&!loading&&(
                <a href={gmailLink} target="_blank" rel="noreferrer" style={emailBtnStyle}>
                  ✉ Open Gmail Draft
                </a>)}
            </div>
          </div>

          <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:12,flexWrap:"wrap"}}>
            {lastRun&&<span style={{fontSize:11,color:C.muted,fontFamily:C.mono}}>Last: {lastRun}</span>}
            {gmailLink&&!loading&&<Tag color={C.green}>✉ Gmail draft ready for {EMAIL_TO}</Tag>}
          </div>

          <Terminal logs={logs}/>

          {summary&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))",gap:10,marginBottom:18}}>
              {[["Avg Sell-Through",summary.avgSTR+"%",C.green,22],
                ["Market",summary.hotMarket,C.text,13],
                ["Best List Time",summary.bestTimeToSell,C.text,13],
                ["Analyzed",summary.totalAnalyzed,C.text,22]
              ].map(([l2,val,col,fs])=>(
                <div key={l2} style={{background:C.card,border:"1px solid "+C.border,borderRadius:12,padding:"14px 16px"}}>
                  <div style={lbl}>{l2}</div>
                  <div style={{fontSize:fs,fontWeight:700,color:col,lineHeight:1.3}}>{val}</div>
                </div>))}
            </div>)}

          {gmailLink&&!loading&&(
            <div style={{background:C.greenLo,border:"1px solid "+C.green+"44",
              borderRadius:12,padding:"14px 18px",marginBottom:16,
              display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:12}}>
              <div>
                <div style={{fontSize:13,fontWeight:600,color:C.green}}>✉ Daily report ready</div>
                <div style={{fontSize:12,color:C.textDim,marginTop:3}}>Pre-filled Gmail draft to {EMAIL_TO}</div>
              </div>
              <a href={gmailLink} target="_blank" rel="noreferrer"
                style={{...emailBtnStyle,fontSize:14,padding:"10px 22px"}}>
                Open Gmail & Send →
              </a>
            </div>)}

          {results.length>0?(
            <div>
              <div style={lbl}>{"🔥 Top Sellers — "+new Date().toLocaleDateString()}</div>
              {results.map((item,i)=><ResultCard key={i} item={item} rank={i+1}/>)}
            </div>
          ):!loading&&(
            <div style={{textAlign:"center",padding:"56px 24px",color:C.muted}}>
              <div style={{fontSize:48,marginBottom:16,opacity:.25}}>📡</div>
              <div style={{fontSize:15,fontWeight:600,color:C.textDim,marginBottom:6}}>Initializing daily scan...</div>
              <div style={{fontSize:13}}>Auto-runs on launch if no scan found today</div>
            </div>)}
        </>)}

        {/* ── SCHEDULER ── */}
        {tab==="scheduler"&&(<>
          <div style={cardStyle}>
            <div style={lbl}>Auto-Scan Schedule</div>
            <div style={{display:"flex",gap:24,flexWrap:"wrap",marginBottom:20}}>
              <div>
                <div style={{...lbl,marginBottom:8}}>Auto-scan</div>
                <div style={{display:"flex",gap:8}}>
                  {["On","Off"].map(opt=>(
                    <button key={opt} onClick={()=>setAutoEnabled(opt==="On")} style={{
                      padding:"8px 20px",borderRadius:8,fontSize:13,fontWeight:600,
                      border:"1px solid "+((opt==="On")===autoEnabled?C.green:C.border),
                      background:(opt==="On")===autoEnabled?C.greenLo:C.card2,
                      color:(opt==="On")===autoEnabled?C.green:C.textDim,
                      cursor:"pointer",fontFamily:"inherit"}}>{opt}</button>))}
                </div>
              </div>
              <div>
                <div style={{...lbl,marginBottom:8}}>Daily scan time</div>
                <input type="time" value={scheduleTime} onChange={e=>setScheduleTime(e.target.value)}
                  style={{...inp,width:"auto"}}/>
              </div>
            </div>
            {autoEnabled&&nextRun&&(
              <div style={{background:C.greenLo,border:"1px solid "+C.green+"40",
                borderRadius:10,padding:"12px 16px",marginBottom:16}}>
                <div style={{fontSize:12,color:C.green,fontFamily:C.mono}}>
                  {"⏰ Next scan: "+nextRun.toLocaleString("en-US",{weekday:"short",month:"short",
                    day:"numeric",hour:"2-digit",minute:"2-digit"})}
                </div>
                <div style={{fontSize:11,color:C.textDim,marginTop:4}}>
                  Gmail draft opens automatically after scan
                </div>
              </div>)}
            <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
              <button style={primaryBtn(loading)} onClick={()=>runScout(false)} disabled={loading}>
                {loading?<Spin/>:"▶"} {loading?"Running...":"Run Now"}
              </button>
              {gmailLink&&<a href={gmailLink} target="_blank" rel="noreferrer" style={emailBtnStyle}>✉ Open Gmail Draft</a>}
            </div>
          </div>

          <div style={cardStyle}>
            <div style={lbl}>How It Works</div>
            {[["📡","Scans on launch","Opens and auto-scans eBay if no scan today. Keep app open for daily scheduling."],
              ["🧠","AI + Web Search","Analyzes eBay sold/completed listings with live Anthropic web search."],
              ["💾","Saved locally","Each scan is saved to your browser's localStorage — persists between launches."],
              ["✉️","One-click email","Generates a pre-filled Gmail draft. Click to open and send to "+EMAIL_TO+"."],
            ].map(([icon,title,desc])=>(
              <div key={title} style={{display:"flex",gap:14,marginBottom:14,alignItems:"flex-start"}}>
                <div style={{fontSize:22,flexShrink:0}}>{icon}</div>
                <div>
                  <div style={{fontSize:13,fontWeight:600,color:C.text,marginBottom:3}}>{title}</div>
                  <div style={{fontSize:12,color:C.textDim,lineHeight:1.5}}>{desc}</div>
                </div>
              </div>))}
          </div>
        </>)}

        {/* ── HISTORY ── */}
        {tab==="history"&&!viewEntry&&(<>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={lbl}>{"Scan Log ("+history.length+" scans)"}</div>
            <button onClick={loadHistory} style={{padding:"6px 14px",borderRadius:8,
              border:"1px solid "+C.border,background:C.card2,color:C.textDim,
              fontSize:12,cursor:"pointer",fontFamily:"inherit"}}>↻ Refresh</button>
          </div>
          {history.length===0?(
            <div style={{textAlign:"center",padding:"48px",color:C.muted}}>
              <div style={{fontSize:36,opacity:.3,marginBottom:12}}>📋</div>
              <div style={{fontSize:14,color:C.textDim}}>No history yet — run a scout first</div>
            </div>
          ):history.map((e,i)=><LogRow key={i} entry={e} onView={setViewEntry}/>)}
        </>)}

        {tab==="history"&&viewEntry&&(<>
          <div style={{display:"flex",gap:12,alignItems:"center",marginBottom:18,flexWrap:"wrap"}}>
            <button onClick={()=>setViewEntry(null)} style={{padding:"7px 16px",borderRadius:8,
              border:"1px solid "+C.border,background:C.card,color:C.textDim,
              fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>← Back</button>
            <div>
              <div style={{fontSize:14,fontWeight:600,color:C.text}}>{fmtDate(viewEntry.timestamp)}</div>
              <div style={{fontSize:12,color:C.textDim}}>{(viewEntry.items?.length||0)+" items"}</div>
            </div>
            {viewEntry.gmailLink&&(
              <a href={viewEntry.gmailLink} target="_blank" rel="noreferrer"
                style={{...emailBtnStyle,marginLeft:"auto"}}>✉ Resend Draft</a>)}
          </div>
          {(viewEntry.items||[]).map((item,i)=><ResultCard key={i} item={item} rank={i+1}/>)}
        </>)}

        {/* ── SETTINGS ── */}
        {tab==="settings"&&(
          <div style={cardStyle}>
            <div style={lbl}>API Key</div>
            <div style={{fontSize:13,color:C.textDim,marginBottom:12}}>
              Update your Anthropic API key. Stored locally on this device only.
            </div>
            <div style={{display:"flex",gap:10,marginBottom:16}}>
              <input type="password" defaultValue={apiKey}
                id="apiKeyInput"
                placeholder="sk-ant-..."
                style={{...inp,flex:1,fontFamily:C.mono}}/>
              <button onClick={()=>{
                const v=document.getElementById("apiKeyInput").value.trim();
                if(v){saveApiKey(v);alert("API key saved!");}
              }} style={{...primaryBtn(false),whiteSpace:"nowrap"}}>
                Save Key
              </button>
            </div>
            <div style={{fontSize:12,color:C.muted,lineHeight:1.7}}>
              Get your key at{" "}
              <a href="https://console.anthropic.com/settings/keys" target="_blank"
                style={{color:C.accent}}>console.anthropic.com</a>
              {" → API Keys. Each daily scan costs a few cents."}
            </div>
            <div style={{marginTop:20,paddingTop:20,borderTop:"1px solid "+C.border}}>
              <div style={lbl}>Email Destination</div>
              <div style={{background:C.surface,border:"1px solid "+C.accentBrd,
                borderRadius:10,padding:"12px 16px",fontFamily:C.mono,fontSize:15,color:C.accent}}>
                {EMAIL_TO}
              </div>
            </div>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>

<!-- Service Worker Registration -->
<script>
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("/sw.js")
      .then((reg) => console.log("[FSS] SW registered:", reg.scope))
      .catch((err) => console.warn("[FSS] SW registration failed:", err));
  });
}

// iOS PWA: detect if running as installed app
if (window.navigator.standalone === true) {
  console.log("[FSS] Running as iOS PWA");
  document.documentElement.style.setProperty("--safe-bottom", "env(safe-area-inset-bottom)");
}
</script>
</body>
</html>
